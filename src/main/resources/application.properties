spring.application.name=backend

spring.datasource.url=jdbc:postgresql://localhost:5432/crm_backend
spring.datasource.username=postgres
spring.datasource.password=1234

spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.jpa.show-sql=true

server.error.include-message=always
server.error.include-stacktrace=always

# Logging configuration for debugging
logging.level.root=INFO
logging.level.org.springdoc=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.com.crm.backend=DEBUG

# JWT configuration
app.jwt.secret=d2ViLXNlY3VyZS1jcm0tYmFja2VuZC1zdXBlci1zZWNyZXQta2V5LWZvci1obWFjLXNoYTI1Ng==
app.jwt.access-token-expiration=900000
app.jwt.refresh-token-expiration=604800000

# OpenAPI/Springdoc configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method

